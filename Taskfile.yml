version: '3'

includes:
  cargo:
    taskfile: ./mono-dev/task/cargo.yaml
    optional: true
    internal: true

  git:
    taskfile: ./mono-dev/task/git.yaml
    optional: true
    internal: true

  common:
    taskfile: ./mono-dev/task/common.yaml
    optional: true
    internal: true

tasks:
  install:
    - rm -rf mono-dev
    - git clone https://github.com/Pistonight/mono-dev --depth 1

  check:
    - task: cargo:clippy-all
    - task: cargo:fmt-check

  fix:
    - task: cargo:fmt-fix

  upgrade:
    - cargo upgrade
    
  publish:
    vars:
      VERSION:
        sh: grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"$' Cargo.toml | head -n1 | sed -E 's/^version = "([^"]+)"$/\1/'
    cmds:
      - task: install
      - cargo build
      - task: check
      - task: git:check-modification
      - git tag 'v{{.VERSION}}'
      - git push origin 'v{{.VERSION}}'
      - cargo publish
